<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer"> 
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Weini.77 Shop | 官方行動商城</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { 
      --bg: #83A6D4; 
      --primary: #4A6283;   
      --text-main: #2C3E50; 
      --accent-pink: #E19898;
    }
    body { background-color: var(--bg); color: var(--text-main); -webkit-tap-highlight-color: transparent; }
    
    /* 智慧留白 (Smart Contain) 核心比例容器 */
    .img-aspect-ratio { width: 100%; aspect-ratio: 4 / 5; position: relative; overflow: hidden; }
    
    /* 🎯 方案 C：外連播放覆蓋層 */
    .video-cover-container { width: 100%; height: 100%; display: none; background: #000; position: absolute; top:0; left:0; z-index: 10; cursor: pointer; }
    
    /* 隱藏滾動條 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans antialiased pb-32">

  <div class="w-full flex justify-end gap-2 px-4 pt-4 pb-1 relative z-50">
    <a href="https://lin.ee/UyP3YhJ" target="_blank" class="text-[11px] font-bold text-white bg-slate-800/40 backdrop-blur-md px-2.5 py-1.5 rounded-xl">LINE客服</a>
    <a href="https://www.instagram.com/weini.77shop?igsh=cTdpMDNtdGozVr" target="_blank" class="text-[11px] font-bold text-white bg-slate-800/40 backdrop-blur-md px-2.5 py-1.5 rounded-xl">官方IG</a>
    <a href="https://www.instagram.com/penny_1030_?igsh=MjgzdXp4YWxoMmFx" target="_blank" class="text-[11px] font-bold text-white bg-slate-800/40 backdrop-blur-md px-2.5 py-1.5 rounded-xl">闆娘IG</a>
  </div>

  <div id="memberBadgeBar" class="mx-4 my-2 px-3 py-2 bg-white/20 backdrop-blur-md rounded-xl text-xs text-white font-bold flex justify-between items-center shadow-sm" style="display:none;">
    <div>會員帳號：<span id="txtMemberPhone"></span> 已連線登入</div>
    <button class="bg-slate-900/60 text-white px-2 py-1 rounded-lg text-[10px] uppercase tracking-wider" onclick="fireMemberLogout()">登出</button>
  </div>

  <div class="flex flex-col items-center text-center px-4 py-3">
    <img src="https://i.postimg.cc/qBskp62d/6500d65a-71fe-4827-a080-e9b8534bbecd.jpg" class="w-[84px] h-[84px] rounded-full border-2 border-white shadow-md">
    <div class="text-2xl font-black text-white mt-2 tracking-widest drop-shadow-sm">Weini.77 Shop</div>
  </div>

  <div id="announcement" class="bg-white/20 text-white mx-4 py-2 px-4 text-xs text-center font-semibold rounded-xl backdrop-blur-sm">Welcome~</div>

  <div class="px-4 mt-4 flex flex-col gap-2 relative z-40">
    <div class="bg-white/90 backdrop-blur-lg p-2.5 rounded-2xl shadow-sm flex flex-col gap-2">
      
      <div class="grid grid-cols-12 gap-1.5 items-center">
        <div class="col-span-8 relative">
          <input type="text" id="searchInput" class="w-full bg-slate-100 border-none rounded-xl py-2 pl-3 pr-8 text-xs text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-slate-400" placeholder="搜尋貨號或名稱關鍵字...">
          <button onclick="searchProducts()" class="absolute right-2 top-2.5 text-slate-400 hover:text-slate-600 focus:outline-none">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </button>
        </div>
        <div class="col-span-4">
          <button onclick="searchProducts()" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-bold text-[11px] py-2 rounded-xl transition shadow-sm tracking-wider">搜尋商品</button>
        </div>
      </div>

      <div class="h-[1px] bg-slate-200/60 my-0.5"></div>

      <div class="grid grid-cols-12 gap-1.5 items-center">
        <div class="col-span-8">
          <input type="tel" id="queryPhone" class="w-full bg-slate-100 border-none rounded-xl py-2 px-3 text-xs text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-slate-400" placeholder="輸入手機號碼登入/對帳...">
        </div>
        <div class="col-span-4">
          <button onclick="checkOrderHistory()" class="w-full bg-rose-400 hover:bg-rose-500 text-white font-bold text-[11px] py-2 rounded-xl transition shadow-sm tracking-wider">登入 / 對帳</button>
        </div>
      </div>

      <div id="queryResultArea" class="hidden mt-2 text-xs border-t border-dashed border-slate-300 pt-2 relative">
        <span class="absolute top-1 right-1 text-slate-400 font-bold text-sm cursor-pointer p-1" onclick="closeQueryPanel()">✕</span>
        <div id="multiOrdersContainer" class="space-y-2"></div> 
      </div>
    </div>
  </div>

  <div class="w-full mt-4 sticky top-0 z-30 bg-[#83A6D4] py-2 border-b border-white/10 shadow-sm">
    <div class="flex flex-wrap justify-center items-center gap-2 px-4" id="categoryTabs">
      <button class="filter-tag active text-xs font-bold px-4 py-1.5 rounded-full transition-all duration-200 bg-[#4A6283] text-white shadow-sm scale-105" onclick="filterCategory('全部')">全部商品</button>
      <button class="filter-tag hidden text-xs font-bold px-4 py-1.5 rounded-full transition-all duration-200 border border-rose-600 text-rose-600 bg-transparent" id="tabFavsBtn" onclick="filterCategory('🤍 我的收藏')">我的收藏</button>
    </div>
  </div>

  <div id="catalog" class="product-grid mt-2"></div>

  <div id="paginationCtrl" class="pagination-container hidden">
    <button id="btnPrevPage" class="page-btn text-xs font-bold" onclick="goToPage(currentPage - 1)">上一頁</button>
    <span id="pageIndicator" class="page-info text-xs">1 / 1</span>
    <button id="btnNextPage" class="page-btn text-xs font-bold" onclick="goToPage(currentPage + 1)">下一頁</button>
  </div>

  <div class="float-controls">
    <button id="backToTopBtn" class="float-top-btn text-lg" onclick="scrollToTop()">↑</button>
    <button id="viewCartBtn" class="float-cart-btn text-xs tracking-wider" onclick="toggleCart(true)">購物車 (0)</button>
  </div>

  <div id="itemModal" class="modal px-4">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal()">✕</span>
      <div class="img-aspect-ratio bg-slate-50" id="swiperArea">
        <button class="arrow" id="prevBtn" style="left:10px;" onclick="changeImg(-1)">❮</button>
        <img id="itemImg" src="" class="w-full h-full object-cover">
        
        <div id="videoCoverContainer" class="video-cover-container" onclick="launchExternalVideo()">
          <img id="videoCoverImg" src="" class="w-full h-full object-cover">
          <div class="video-play-overlay">
            <div class="video-play-icon text-white">▶</div>
            <span class="text-white">點擊觀看官方實體 Reels / 動態短影音 🎬</span>
          </div>
        </div>
        
        <button class="arrow" id="nextBtn" style="right:10px;" onclick="changeImg(1)">❯</button>
        <div class="indicator-dots" id="dotsContainer"></div>
      </div>
      
      <div class="detail-body bg-white">
        <div id="itemTitle" class="font-bold text-slate-800 text-base"></div>
        
        <div class="promo-module-box" id="promoModuleBox" style="display:none;"></div>

        <div id="itemDesc" class="text-xs text-slate-500 mt-2 leading-relaxed max-h-24 overflow-y-auto no-scrollbar"></div>
        
        <div class="price-container my-3">
          <span class="price-old" id="itemOldPrice"></span>
          <span class="price-new text-xl" id="itemPrice"></span>
          <span id="txtStockLabel" class="text-[11px] font-bold text-rose-500 ml-auto"></span>
        </div>
        
        <div class="flex gap-2 mt-3">
          <div class="flex-1"><select id="variantSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5" onchange="syncSelectedVariantPrice()"></select></div>
          <div class="w-16"><input type="number" id="qtyInput" value="1" min="1" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5 text-center"></div>
        </div>

        <div id="addonSectionBlock" class="mt-4 border-t border-dashed border-slate-200 pt-3" style="display:none;">
          <div class="text-[11px] font-bold text-slate-600 mb-1.5">🛍️ 專屬超值加購品項目推薦：</div>
          <div id="addonItemsList" class="space-y-1.5"></div>
        </div>

        <div class="flex gap-2 mt-5">
          <button class="action-btn text-sm rounded-xl py-3" id="addToCartBtn" onclick="addToCart()">加入購物車</button>
          <button type="button" class="action-btn text-sm rounded-xl py-3" id="favProductBtn" style="background:#FFF0F0; color:#C53030; width:auto; padding:0 14px; border:1px solid var(--accent-pink);">🤍 收藏</button>
          <button type="button" class="action-btn text-sm rounded-xl py-3" id="shareProductBtn" style="background:#64748B; width:auto; padding:0 14px;">🔗 分享</button>
        </div>
      </div>
    </div>
  </div>

  <div id="cartDrawer" class="cart-drawer">
    <div class="text-right text-xl font-bold text-slate-400 cursor-pointer" onclick="toggleCart(false)">✕</div>
    <h3 class="text-center text-base font-bold text-slate-800 -mt-4 mb-4">🛒 購物車明細</h3>
    <div id="cartList" class="max-h-48 overflow-y-auto no-scrollbar"></div>
    
    <div class="mt-4">
      <label class="text-xs font-bold text-slate-500">配送方式</label>
      <select id="shipSelectDropdown" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5 mt-1" onchange="calculateDynamicShipping()"></select>
    </div>
    <div id="shippingAddressBlock" class="mt-2 grid grid-cols-12 gap-2">
      <div class="col-span-4"><input type="text" id="custZip" placeholder="郵遞區號" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5"></div>
      <div class="col-span-8"><input type="text" id="custAddress" placeholder="完整收件地址" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5"></div>
    </div>
    <div id="shippingStoreBlock" class="mt-2 hidden">
      <input type="text" id="storeName" placeholder="請填寫超商門市名稱" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5">
    </div>
    
    <div class="mt-3 bg-slate-50 border border-slate-150 p-3 rounded-xl">
      <div class="text-[11px] font-bold text-slate-600 mb-1">💰 匯款資訊說明</div>
      <div id="paymentConfigText" class="text-xs text-slate-500 white-space-pre-line leading-relaxed"></div>
    </div>
    
    <div class="mt-3 flex gap-2">
      <input type="text" id="discountInput" placeholder="輸入折扣碼" class="bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5 flex-1">
      <button type="button" onclick="applyPromo()" class="bg-slate-800 text-white font-bold text-xs px-4 rounded-xl">套用</button>
    </div>
    
    <div class="text-right my-4 text-xs text-slate-600 space-y-1">
      <div>商品小計：$<span id="subTotal">0</span></div>
      <div id="shippingNoticeText" class="text-[11px] text-rose-500 font-bold"></div>
      <div>折扣折抵：-$<span id="discountAmt">0</span></div>
      <div>物流運費：$<span id="shipFee">0</span></div>
      <div class="text-base font-black text-rose-400 pt-1">應匯款總額：NT$ <span id="grandTotal">0</span></div>
    </div>
    
    <div class="border-t border-dashed border-slate-200 pt-3">
      <label class="text-xs font-bold text-slate-500">確認預訂人聯絡資訊</label>
      <div class="flex gap-2 mt-1 mb-2">
        <input type="tel" id="custPhone" placeholder="手機號碼 (必填)" class="bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5 flex-1">
        <button type="button" onclick="autoFillCustomerData(event)" class="bg-slate-700 text-white font-bold text-xs px-3 rounded-xl shadow-sm">帶入資料</button>
      </div>
      <input type="text" id="custName" placeholder="訂購人姓名 (必填)" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5 mb-2">
      <input type="text" id="lineName" placeholder="LINE 名稱 (必填)" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5 mb-2">
      <input type="text" id="shipReceiverName" placeholder="收件人姓名 (必填)" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5 mb-2">
      <input type="email" id="custEmail" placeholder="收件人電子信箱 mail (必填)" class="w-full bg-slate-50 border border-slate-200 rounded-xl text-xs p-2.5 mb-2">
    </div>
    <button class="action-btn text-sm rounded-xl py-3.5 bg-rose-400 hover:bg-rose-500 mt-2 shadow-md" onclick="submitFinalOrder()">確認並送出預訂單</button>
  </div>

  <div class="w-full flex flex-col items-center justify-center gap-4 pt-12 pb-6 px-4">
    <div class="flex flex-col items-center justify-center w-full max-w-[280px]">
      <div class="w-full text-center text-xs font-bold text-white/90 cursor-pointer py-1.5" onclick="togglePolicyCard('boxNotice')">
        購物須知 <span id="arr_boxNotice" class="text-[10px] ml-0.5">▼</span>
      </div>
      <div id="boxNotice" class="policy-body w-full text-center text-[11px] text-slate-100/80 max-h-0 overflow-hidden transition-all duration-300 ease-out">讀取中...</div>
    </div>
    
    <div class="flex flex-col items-center justify-center w-full max-w-[280px]">
      <div class="w-full text-center text-xs font-bold text-white/90 cursor-pointer py-1.5" onclick="togglePolicyCard('boxRefund')">
        退換貨須知 <span id="arr_boxRefund" class="text-[10px] ml-0.5">▼</span>
      </div>
      <div id="boxRefund" class="policy-body w-full text-center text-[11px] text-slate-100/80 max-h-0 overflow-hidden transition-all duration-300 ease-out">讀取中...</div>
    </div>
    
    <div class="flex flex-col items-center justify-center w-full max-w-[280px]">
      <div class="w-full text-center text-xs font-bold text-white/90 cursor-pointer py-1.5" onclick="togglePolicyCard('boxPrivacy')">
        隱私權政策 <span id="arr_boxPrivacy" class="text-[10px] ml-0.5">▼</span>
      </div>
      <div id="boxPrivacy" class="policy-body w-full text-center text-[11px] text-slate-100/80 max-h-0 overflow-hidden transition-all duration-300 ease-out">讀取中...</div>
    </div>
  </div>

  <script>
    let rawData = [], products = [], cart = [], selectedIdx = -1, promoList = [], discountValue = 0;
    let curImgs = [], imgIdx = 0, currentShipping = '', dynamicShippingMap = {}, marketingRules = [];
    let touchStartX = 0, touchEndX = 0, currentActiveVideoUrl = "", activeProductSpecs = [];
    let favoriteSkus = JSON.parse(localStorage.getItem('w77_favs') || '[]'); 
    let currentLoginUser = localStorage.getItem('w77_user') || ""; 
    
    let currentPage = 1; const itemsPerPage = 20;

    window.onscroll = function() {
      let topBtn = document.getElementById("backToTopBtn");
      if (document.body.scrollTop > 250 || document.documentElement.scrollTop > 250) { topBtn.style.display = "flex"; } else { topBtn.style.display = "none"; }
    };
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function myAlert(msg) { document.getElementById('alertMsg').innerHTML = msg; document.getElementById('customAlert').style.display = 'flex'; }
    function closeAlert() { document.getElementById('customAlert').style.display = 'none'; }
    function closeQueryPanel() { document.getElementById('queryResultArea').classList.add('hidden'); document.getElementById('multiOrdersContainer').innerHTML = ""; document.getElementById('queryPhone').value = ""; }
    
    function togglePolicyCard(id) {
      let body = document.getElementById(id); let arr = document.getElementById('arr_' + id);
      if (body.style.maxHeight && body.style.maxHeight !== '0px') {
        body.style.maxHeight = '0px'; body.style.paddingTop = '0px'; arr.innerText = "▼";
      } else {
        body.style.maxHeight = '200px'; body.style.paddingTop = '6px'; arr.innerText = "▲";
      }
    }

    window.onload = () => {
      if(currentLoginUser) { refreshMemberStatusUI(currentLoginUser); }

      const swiperArea = document.getElementById('swiperArea');
      swiperArea.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
      swiperArea.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, false);

      fetch(API_URL).then(r => r.json()).then(res => {
          promoList = res.promos;
          marketingRules = res.marketingRules || [];
          document.getElementById('announcement').innerText = res.announcement;
          document.getElementById('paymentConfigText').innerText = res.paymentInfo || "暫無收款說明";
          
          document.getElementById('boxNotice').innerText = res.shopNotice || "暫無設定";
          document.getElementById('boxRefund').innerText = res.refundNotice || "暫無設定";
          document.getElementById('boxPrivacy').innerText = res.privacyPolicy || "暫無設定";

          setupCategories(res.majorCategories);
          renderMarketingBar();
          
          if (res.shipModes && res.shipFees) {
            let modes = res.shipModes.split(/[,，]/); let fees = res.shipFees.split(/[,，]/);
            const selectDropdown = document.getElementById('shipSelectDropdown'); selectDropdown.innerHTML = "";
            modes.forEach((m, index) => {
              let mName = m.trim(); let mFee = Number(fees[index] ? fees[index].trim() : 0);
              dynamicShippingMap[mName] = mFee;
              let o = document.createElement('option'); o.value = mName; o.text = `${mName} ($${mFee})`; selectDropdown.appendChild(o);
            });
            if(modes.length > 0) currentShipping = modes[0].trim();
          }

          let fallbackUrl = document.getElementById('fallbackLogo').src;
          rawData = res.products.filter(p => p[0] && p[0].toString().trim() !== "" && p[2] !== "下架").map(p => {
            let pObj = { sku: p[0], name: p[1], status: p[2], category: p[3], tag: p[4], desc: p[5], video: p[6] };
            if (!p[7] || p[7].toString().trim() === "") { pObj.processedImgs = [fallbackUrl]; } 
            else { pObj.processedImgs = p[7].toString().split(/[\s\n\r]+/).map(u => u.trim()).filter(u => u !== ""); }
            pObj.specs = p[8] ? JSON.parse(p[8]) : [];
            pObj.addons = p[9] ? JSON.parse(p[9]) : [];
            return pObj;
          });
          
          products = rawData;
          currentPage = 1;
          renderCatalog(products);

          const urlParams = new URLSearchParams(window.location.search);
          const skuParam = urlParams.get('sku');
          if(skuParam) {
            let foundIdx = products.findIndex(p => p.sku.toString().trim().toLowerCase() === skuParam.trim().toLowerCase());
            if(foundIdx !== -1) { setTimeout(() => openProduct(foundIdx), 500); }
          }
        }).catch(err => { console.error(err); myAlert("雲端連線失敗，請稍候重試。"); });
    };

    function handleSwipe() {
      if (curImgs.length <= 1) return;
      if (touchStartX - touchEndX > 45) { changeImg(1); }
      if (touchEndX - touchStartX > 45) { changeImg(-1); }
    }
    
    function setupCategories(cateStr) {
      const tabs = document.getElementById('categoryTabs'); if(!cateStr) return;
      // 先清空除“全部”外的舊標籤
      tabs.innerHTML = `<button class="filter-tag active text-xs font-bold px-4 py-1.5 rounded-full transition-all duration-200 bg-[#4A6283] text-white shadow-sm scale-105" onclick="filterCategory('全部')">全部商品</button>` +
                       `<button class="filter-tag hidden text-xs font-bold px-4 py-1.5 rounded-full transition-all duration-200 border border-rose-600 text-rose-600 bg-transparent" id="tabFavsBtn" onclick="filterCategory('🤍 我的收藏')">我的收藏</button>`;
      
      cateStr.split(/[,，]/).forEach(cat => {
        let btn = document.createElement('button');
        // 🎯 標籤按鈕未選取時：精緻細框、自動縮小、與主體同色
        btn.className = 'filter-tag text-xs font-bold px-3.5 py-1.5 rounded-full border border-[#4A6283] text-[#4A6283] bg-transparent transition-all duration-200';
        btn.innerText = cat.trim();
        btn.onclick = (e) => {
          document.querySelectorAll('.filter-tag').forEach(t => {
            t.classList.remove('active', 'bg-[#4A6283]', 'text-white', 'shadow-sm', 'scale-105', 'border-transparent');
            if(!t.innerText.includes('我的收藏')) t.classList.add('border-[#4A6283]', 'text-[#4A6283]', 'bg-transparent');
          });
          btn.classList.add('active', 'bg-[#4A6283]', 'text-white', 'shadow-sm', 'scale-105', 'border-transparent');
          filterCategory(cat.trim());
        };
        tabs.appendChild(btn);
      });
      if(currentLoginUser) document.getElementById('tabFavsBtn').classList.remove('hidden');
    }
    
    function filterCategory(cat) {
      if(cat === '全部') { products = rawData; } 
      else if(cat === '🤍 我的收藏') { products = rawData.filter(p => favoriteSkus.includes(p.sku)); }
      else { products = rawData.filter(p => p.category && p.category.toString().trim().includes(cat)); }
      currentPage = 1;
      renderCatalog(products);
    }
    
    function searchProducts() {
      let val = document.getElementById('searchInput').value.toLowerCase().trim();
      if(val === "") { products = rawData; currentPage = 1; renderCatalog(products); return; }
      products = rawData.filter(p => p.sku.toLowerCase().includes(val) || p.name.toLowerCase().includes(val));
      currentPage = 1;
      renderCatalog(products);
    }
    
    // 🎯 核心修復：使用反引號模板字串，徹底排除文字代碼外露錯誤，注入頂級圖片插隊加載
    function renderCatalog(list) {
      const box = document.getElementById('catalog'); box.innerHTML = "";
      if(list.length === 0) { 
        box.innerHTML = `<p class="col-span-2 text-center text-white text-xs py-10">目前無此商品</p>`; 
        document.getElementById('paginationCtrl').classList.add('hidden'); return; 
      }
      document.getElementById('paginationCtrl').classList.remove('hidden');
      let totalPages = Math.ceil(list.length / itemsPerPage) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      
      let startIdx = (currentPage - 1) * itemsPerPage; let endIdx = Math.min(startIdx + itemsPerPage, list.length);
      
      for(let i = startIdx; i < endIdx; i++) {
        let p = list[i]; 
        let card = document.createElement('div'); 
        card.className = 'product-card'; 
        card.onclick = () => openProduct(rawData.indexOf(p));
        let firstImg = p.processedImgs[0];
        
        let minPrice = "詢問售價", oldPriceText = "";
        if(p.specs && p.specs.length > 0) {
          let prices = p.specs.map(s => s.price); minPrice = `NT$ ${Math.min(...prices)}`;
          if(p.specs[0].oldPrice) { oldPriceText = `<span class="price-old">NT$ ${p.specs[0].oldPrice}</span>`; }
        }
        
        let tagHtml = p.tag ? `<div class="tag-badge">${p.tag}</div>` : "";
        let priorityAttr = (i - startIdx < 4) ? 'fetchpriority="high"' : 'loading="lazy"';
        
        // 🎯 修正核心：全面鎖定反引號
        card.innerHTML = `${tagHtml}
          <img src="${firstImg}" ${priorityAttr} decoding="async">
          <div class="product-info">
            <div class="product-title">[${p.sku}] ${p.name}</div>
            <div class="price-container">
              ${oldPriceText}
              <span class="price-new">${minPrice}</span>
            </div>
          </div>`;
        box.appendChild(card);
      }
      document.getElementById('pageIndicator').innerText = `${currentPage} / ${totalPages}`;
      document.getElementById('btnPrevPage').disabled = (currentPage === 1);
      document.getElementById('btnNextPage').disabled = (currentPage === totalPages);
    }

    function goToPage(targetPage) { currentPage = targetPage; renderCatalog(products); scrollToTop(); }
    function renderMarketingBar() {
      const box = document.getElementById('promoModuleBox'); if(marketingRules.length === 0) return;
      box.innerHTML = "🎁 <b>本月優惠活動：</b><br>" + marketingRules.map(r => `• ${r.text}`).join('<br>');
      box.style.display = "block";
    }

    function openProduct(idx) {
      selectedIdx = idx; const p = rawData[idx];
      document.getElementById('itemModal').style.display = 'flex';
      imgIdx = 0; curImgs = [...p.processedImgs];
      activeProductSpecs = p.specs || [];
      
      let videoUrl = p.video ? p.video.toString().trim() : "";
      let videoBox = document.getElementById('videoCoverContainer');
      if (videoUrl !== "") { currentActiveVideoUrl = videoUrl; videoBox.style.display = "block"; document.getElementById('videoCoverImg').src = curImgs[0]; } 
      else { currentActiveVideoUrl = ""; videoBox.style.display = "none"; }

      const vSelect = document.getElementById('variantSelect'); vSelect.innerHTML = "";
      if(activeProductSpecs.length === 0 || activeProductSpecs[0].spec === '單一規格') {
        let o = document.createElement('option'); o.text = "標準單一規格款式"; o.value = "single"; vSelect.appendChild(o);
        document.getElementById('specSelectorsRow').style.display = (activeProductSpecs.length === 0)? "none":"flex";
      } else {
        document.getElementById('specSelectorsRow').style.display = "flex";
        activeProductSpecs.forEach((s, idx) => {
          let o = document.createElement('option'); o.value = idx;
          o.text = s.spec.replace('尺寸:','').replace('顏色:','');
          vSelect.appendChild(o);
        });
      }

      const addonBlock = document.getElementById('addonSectionBlock');
      const addonList = document.getElementById('addonItemsList'); addonList.innerHTML = "";
      if(p.addons && p.addons.length > 0) {
        addonBlock.style.display = "block";
        p.addons.forEach((a, index) => {
          addonList.innerHTML += `<div class="addon-item-row"><input type="checkbox" class="addon-chk-item" data-name="${a.name}" data-price="${a.price}"><span>${a.name} (<b>+${a.price}</b>)</span></div>`;
        });
      } else { addonBlock.style.display = "none"; }

      updateFavoriteButtonUI(p.sku);
      buildDots(); showMediaItem();
      document.getElementById('itemTitle').innerText = `[${p.sku}] ${p.name}`;
      document.getElementById('itemDesc').innerText = p.desc || "";
      syncSelectedVariantPrice();

      document.getElementById('shareProductBtn').onclick = () => {
        let shareUrl = `${window.location.origin}${window.location.pathname}?sku=${encodeURIComponent(p.sku)}`;
        navigator.clipboard.writeText(shareUrl);
        myAlert(`🔗 【${p.sku}】分享導流連結已複製！`);
      };

      document.getElementById('favProductBtn').onclick = () => { toggleFavoriteAction(p.sku); };
    }

    // 🎯 智慧留白與不裁切機制
    function showMediaItem() {
      let currentItem = curImgs[imgIdx]; let imgEl = document.getElementById('itemImg');
      let viewerBox = document.getElementById('swiperArea');
      imgEl.src = (typeof currentItem === "string") ? currentItem : document.getElementById('fallbackLogo').src;
      
      imgEl.onload = function() {
        let ratio = imgEl.naturalWidth / imgEl.naturalHeight;
        if(ratio < 0.65 || currentItem.includes('尺寸') || currentItem.includes('table')) {
          imgEl.style.objectFit = "contain"; viewerBox.style.backgroundColor = "#ffffff";
        } else {
          imgEl.style.objectFit = "cover"; viewerBox.style.backgroundColor = "#F8FAFC";
        }
      };
      updateDots();
    }

    function syncSelectedVariantPrice() {
      if(activeProductSpecs.length === 0) { document.getElementById('itemPrice').innerText = "售價詢問"; return; }
      const vSelect = document.getElementById('variantSelect');
      let matched = (vSelect.value === 'single') ? activeProductSpecs[0] : activeProductSpecs[Number(vSelect.value)];
      
      if(matched) {
        document.getElementById('itemPrice').innerText = "NT$ " + matched.price;
        document.getElementById('itemOldPrice').innerText = matched.oldPrice ? "NT$ " + matched.oldPrice : "";
        let stockLabel = document.getElementById('txtStockLabel');
        let cartBtn = document.getElementById('addToCartBtn');
        if(matched.stock !== "" && Number(matched.stock) <= 0) {
          stockLabel.innerText = "❌ 已售罄斷貨"; cartBtn.disabled = true; cartBtn.innerText = "已售完";
        } else {
          stockLabel.innerText = (matched.stock === "") ? "" : `⚡ 剩餘 ${matched.stock} 件`;
          cartBtn.disabled = false; cartBtn.innerText = "加入購物車";
        }
      }
    }

    function launchExternalVideo() { if (currentActiveVideoUrl !== "") window.open(currentActiveVideoUrl, '_blank'); }
    function buildDots() {
      const container = document.getElementById('dotsContainer'); container.innerHTML = ""; if (curImgs.length <= 1) return;
      curImgs.forEach((_, index) => {
        let dot = document.createElement('div'); dot.className = 'dot' + (index === 0 ? ' active' : '');
        dot.onclick = () => { imgIdx = index; showMediaItem(); }; container.appendChild(dot);
      });
    }
    function updateDots() {
      let dots = document.querySelectorAll('#dotsContainer .dot');
      dots.forEach((dot, index) => { if (index === imgIdx) { dot.classList.add('active'); } else { dot.classList.remove('active'); } });
      let showArrows = curImgs.length > 1 ? 'block' : 'none';
      if (document.getElementById('prevBtn')) document.getElementById('prevBtn').style.display = showArrows;
      if (document.getElementById('nextBtn')) document.getElementById('nextBtn').style.display = showArrows;
    }
    function changeImg(dir) { if (curImgs.length <= 1) return; imgIdx = (imgIdx + dir + curImgs.length) % curImgs.length; showMediaItem(); }
    function closeModal() { document.getElementById('itemModal').style.display = 'none'; }

    function addToCart() {
      const p = rawData[selectedIdx]; const vSelect = document.getElementById('variantSelect');
      let matchedSpec = (vSelect.value === 'single') ? activeProductSpecs[0] : activeProductSpecs[Number(vSelect.value)];
      let specLabel = (vSelect.value === 'single') ? '單一規格' : activeProductSpecs[Number(vSelect.value)].spec.replace('尺寸:','').replace('顏色:','');
      let baseQty = Number(document.getElementById('qtyInput').value);
      
      cart.push({ sku: p.sku, prodName: p.name, specTitle: specLabel, price: matchedSpec.price, qty: baseQty, type: 'main' });
      document.querySelectorAll('.addon-chk-item:checked').forEach(chk => {
        cart.push({ sku: p.sku + "-ADDON", prodName: `【加購】` + chk.dataset.name, specTitle: "隨機", price: Number(chk.dataset.price), qty: baseQty, type: 'addon' });
      });
      updateCartUI();
      let t = document.getElementById('toast'); t.className = 'fixed bottom-40 left-1/2 -translate-x-1/2 bg-black/85 text-white py-3 px-6 text-sm rounded-xl z-[4000] shadow-md transition-opacity duration-300 opacity-100 block';
      setTimeout(() => { t.className = 'hidden'; }, 2000);
    }

    function calculateDynamicShipping() { currentShipping = document.getElementById('shipSelectDropdown').value; setShipping(currentShipping); }
    function setShipping(mode) {
      currentShipping = mode;
      document.getElementById('shippingAddressBlock').style.display = mode.includes('宅配') ? 'grid' : 'none';
      document.getElementById('shippingStoreBlock').style.display = mode.includes('超商') ? 'block' : 'none';
      updateCartUI();
    }

    function updateCartUI() {
      const box = document.getElementById('cartList'); box.innerHTML = ""; let subtotal = 0;
      cart.forEach((item, idx) => {
        let total = item.price * item.qty; subtotal += total;
        box.innerHTML += `<div class="cart-item"><div><b>${item.prodName}</b><br><small>${item.specTitle} x${item.qty}</small></div><span>$${total} <button onclick="removeCart(${idx})" style="border:none;background:none;color:#94A3B8;cursor:pointer;">✕</button></span></div>`;
      });
      
      let freeShipNotice = document.getElementById('shippingNoticeText'); freeShipNotice.innerText = "";
      let activeShipFeeRule = dynamicShippingMap[currentShipping] || 0;
      
      let matchedRule = marketingRules.find(r => currentShipping.includes(r.type.substring(0,2)));
      if(matchedRule && cart.length > 0) {
        if(subtotal >= matchedRule.threshold) { freeShipNotice.innerText = `🎉 已達免運：${matchedRule.text}！`; activeShipFeeRule = 0; } 
        else { freeShipNotice.innerText = `💡 提示：再買 $${matchedRule.threshold - subtotal} 元即享免運！`; }
      }
      let shipFee = cart.length > 0 ? activeShipFeeRule : 0;
      document.getElementById('subTotal').innerText = subtotal; document.getElementById('discountAmt').innerText = discountValue; document.getElementById('shipFee').innerText = shipFee;
      document.getElementById('grandTotal').innerText = (subtotal - discountValue + shipFee < 0) ? 0 : (subtotal - discountValue + shipFee);
      const cartBtn = document.getElementById('viewCartBtn'); cartBtn.style.display = cart.length > 0 ? 'block' : 'none'; cartBtn.innerText = `購物車 (${cart.length})`;
    }
    function removeCart(idx) { cart.splice(idx,1); updateCartUI(); }
    function toggleCart(show) { document.getElementById('cartDrawer').classList.toggle('open', show); }
    function applyPromo() {
      let code = document.getElementById('discountInput').value.trim(); let found = promoList.find(p => p[0] === code);
      if(found) { discountValue = Math.abs(Number(found[1])); myAlert("✨ 折扣碼套用成功，現折 $" + discountValue); } 
      else { discountValue = 0; myAlert("❌ 無效的折扣碼！請重新確認輸入。"); }
      updateCartUI();
    }

    // 🎯 徹底修正對帳看板與字串渲染，封死殘留代碼漏洞
    function checkOrderHistory() {
      let ph = document.getElementById('queryPhone').value.trim(); if(!ph) return myAlert("請輸入手機號碼");
      fetch(API_URL, { method: "POST", body: JSON.stringify({ method: "queryOrderHistory", phone: ph }) })
        .then(r => r.json()).then(res => {
          if(res.success && res.allOrders) {
            currentLoginUser = ph; localStorage.setItem('w77_user', ph);
            refreshMemberStatusUI(ph);
            
            fetch(API_URL, { method: "POST", body: JSON.stringify({ method: "getFavorites", phone: ph }) })
              .then(r=>r.json()).then(fRes => { if(fRes.success) { favoriteSkus = fRes.favorites; localStorage.setItem('w77_favs', JSON.stringify(favoriteSkus)); } });

            const container = document.getElementById('multiOrdersContainer'); container.innerHTML = ""; 
            if(res.allOrders.length === 0) { container.innerHTML = "<p class='text-slate-500'>您目前尚無購買紀錄唷。</p>"; }
            
            res.allOrders.forEach(o => {
              let logisticsInfo = o.logisticsId ? `<div class="text-emerald-600 font-bold mt-1">📦 物流追蹤：【${o.logisticsCompany}】單號: ${o.logisticsId}</div>` : "";
              let rowHtml = '<div class="border-b border-dashed border-slate-200 pb-2 mb-2 text-slate-700">' +
                            '<div><b>預訂單號：</b><span class="text-slate-800 font-bold">' + o.orderId + '</span></div>' +
                            '<div><b>商品明細：</b><br><span class="text-slate-500">' + o.items.join('<br>') + '</span></div>' +
                            '<div><b>訂單狀態：</b><span class="status-badge">' + o.status + ' (' + o.payStatus + ')</span></div>' + logisticsInfo;
              
              if(o.payStatus === '未付款') {
                rowHtml += '<div class="mt-2 flex gap-1.5 items-center">' +
                           '<input type="number" id="payFive_' + o.orderId + '" placeholder="請填入您的匯款後五碼" class="bg-white border border-slate-300 rounded-lg p-1.5 text-xs w-36 focus:outline-none">' +
                           '<button onclick="submitLastFive(\'' + o.orderId + '\')" class="bg-rose-400 text-white font-bold text-[11px] px-3 py-1.5 rounded-lg shadow-sm">回傳對帳</button>' +
                           '</div>';
              }
              rowHtml += '</div>'; container.innerHTML += rowHtml;
            });
            document.getElementById('queryResultArea').classList.remove('hidden');
          } else { myAlert(res.message); }
        });
    }

    function refreshMemberStatusUI(phone) {
      document.getElementById('memberBadgeBar').style.display = "flex";
      document.getElementById('txtMemberPhone').innerText = phone;
      document.getElementById('tabFavsBtn').classList.remove('hidden'); 
    }
    function fireMemberLogout() {
      localStorage.removeItem('w77_user'); currentLoginUser = "";
      document.getElementById('memberBadgeBar').style.display = "none";
      document.getElementById('tabFavsBtn').classList.add('hidden');
      closeQueryPanel(); filterCategory('全部');
      document.querySelectorAll('.filter-tag').forEach(t => {
        t.classList.remove('active', 'bg-[#4A6283]', 'text-white', 'shadow-sm', 'scale-105', 'border-transparent');
      });
      document.querySelector("#categoryTabs button:nth-child(1)").classList.add('active', 'bg-[#4A6283]', 'text-white', 'scale-105');
    }
    function updateFavoriteButtonUI(sku) {
      const btn = document.getElementById('favProductBtn');
      if(favoriteSkus.includes(sku)) { btn.innerText = "❤️ 已收藏"; btn.style.backgroundColor = "#C53030"; btn.style.color = "white"; } 
      else { btn.innerText = "🤍 收藏"; btn.style.backgroundColor = "#FFF0F0"; btn.style.color = "#C53030"; }
    }
    function toggleFavoriteAction(sku) {
      let idx = favoriteSkus.indexOf(sku);
      if(idx !== -1) { favoriteSkus.splice(idx, 1); } else { favoriteSkus.push(sku); }
      localStorage.setItem('w77_favs', JSON.stringify(favoriteSkus));
      updateFavoriteButtonUI(sku);
      if(currentLoginUser) { fetch(API_URL, { method: "POST", body: JSON.stringify({ method: "syncFavorites", phone: currentLoginUser, favorites: favoriteSkus }) }); }
    }
    function autoFillCustomerData(event) {
      if(event) { event.preventDefault(); event.stopPropagation(); }
      let ph = document.getElementById('custPhone').value.trim() || currentLoginUser;
      if(!ph) return myAlert("請先填寫手機號碼再點擊帶入資料唷！");
      fetch(API_URL, { method: "POST", body: JSON.stringify({ method: "queryOrderHistory", phone: ph }) })
        .then(r => r.json()).then(res => {
          if(res.success && res.allOrders && res.allOrders.length > 0) {
            let lastO = res.allOrders[0]; myAlert("✨ 已自動為您填入歷史收件資料！");
            document.getElementById('custPhone').value = ph;
            document.getElementById('custName').value = lastO.custName || "";
            document.getElementById('lineName').value = lastO.lineName || "";
            document.getElementById('shipReceiverName').value = lastO.shipName || lastO.custName || "";
            if(document.getElementById('custEmail') && lastO.email) document.getElementById('custEmail').value = lastO.email;
            let dropdown = document.getElementById('shipSelectDropdown');
            if(dropdown && lastO.shipping) { dropdown.value = lastO.shipping; calculateDynamicShipping(); }
            if(lastO.shipping && lastO.shipping.includes("超商")) {
              document.getElementById('storeName').value = lastO.address ? lastO.address.replace("7-11超商：", "") : "";
            } else { document.getElementById('custAddress').value = lastO.address || ""; }
          } else { myAlert("查無歷史資料，請手動填寫新收件資訊唷。"); }
        });
    }
    function submitLastFive(oid) {
      let ph = document.getElementById('queryPhone').value.trim(); let five = document.getElementById('payFive_' + oid).value.trim();
      if(five.length !== 5) return myAlert("請輸入精確的轉帳後五碼數字！");
      fetch(API_URL, { method: "POST", body: JSON.stringify({ method: "updatePaymentReport", phone: ph, orderId: oid, lastFive: five }) })
        .then(r => r.json()).then(res => { myAlert(res.message); checkOrderHistory(); });
    }
    function submitFinalOrder() {
      let phone = document.getElementById('custPhone').value.trim(), name = document.getElementById('custName').value.trim(), line = document.getElementById('lineName').value.trim(), rxName = document.getElementById('shipReceiverName').value.trim(), email = document.getElementById('custEmail').value.trim();
      if(!phone || !name || !line || !rxName || !email || cart.length === 0) return myAlert("請填寫所有必填的訂購人聯絡資訊。");
      let addr = (currentShipping.includes('宅配')) ? document.getElementById('custAddress').value.trim() : document.getElementById('storeName').value.trim();
      if(!addr) return myAlert((currentShipping.includes('宅配')) ? "請填寫完整收件地址" : "請填寫超商門市名稱");
      let finalAddr = (currentShipping.includes('宅配')) ? `(${document.getElementById('custZip').value}) ${addr}` : `7-11超商：${addr}`;
      let checkoutCart = cart.map(c => ({ sku: c.sku, prodName: c.prodName, color: "規格", size: c.specTitle, qty: c.qty, price: c.price, category: "全系列" }));
      fetch(API_URL, { method: "POST", body: JSON.stringify({ method: "processOrder", cartData: checkoutCart, userInfo: { phone: phone, name: name, lineName: line, shipName: rxName, email: email, shipping: currentShipping, address: finalAddr, grandTotal: document.getElementById('grandTotal').innerText } }) })
        .then(r => r.json()).then(res => {
          myAlert("🎉 預訂成功！訂單已同步寄送至您的 Mail 機構中。\\n您的單號為：<b>" + res.orderId + "</b>");
          cart = []; updateCartUI(); toggleCart(false);
        });
    }
  </script>
</body>
</html>
